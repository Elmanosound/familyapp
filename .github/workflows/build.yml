# ============================================================
#  FamilyApp — CI build & push
#
#  Triggered on every push to `main` (and manually).
#  Builds the multi-stage Docker image on GitHub's fast runners
#  (4 vCPU / 16 GB RAM) instead of the e2-micro VM, then pushes
#  to GitHub Container Registry (ghcr.io — free, no signup).
#
#  On the VM, deploy with a single command:
#    docker compose pull && docker compose up -d
# ============================================================

name: Build & Push

on:
  push:
    branches: [main]
  workflow_dispatch:            # allow manual trigger from GitHub UI

env:
  IMAGE: ghcr.io/${{ github.repository }}   # lowercase repo name required by ghcr.io

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write           # needed to push to ghcr.io

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Set up Docker Buildx (enables BuildKit + multi-arch) ─
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Authenticate with ghcr.io ──────────────────────────
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-injected by GitHub

      # ── 4. Compute image tags ──────────────────────────────────
      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      # ── 5. Build & push ────────────────────────────────────────
      #    - cache-from/to=gha reuses the BuildKit layer cache stored
      #      by GitHub Actions between runs; npm install layer is
      #      virtually instant on subsequent pushes.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          platforms: linux/amd64    # GCP e2-micro is x86_64
